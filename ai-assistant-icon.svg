<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="AI assistant icon">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="47%" r="58%">
      <stop offset="0" stop-color="#f0fdff"/>
      <stop offset=".22" stop-color="#a5f3fc"/>
      <stop offset=".5" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#075985" stop-opacity=".12"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".45" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#0284c7"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.03 0 0 0 0 0.62 0 0 0 0 1 0 0 0 .72 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <circle cx="48" cy="45" r="30" fill="url(#coreGlow)" opacity=".42">
      <animate attributeName="opacity" values=".3;.56;.3" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="45" r="10" fill="url(#nodeGlow)">
      <animate attributeName="r" values="8.5;11;8.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="45" r="17" fill="none" stroke="#bae6fd" stroke-width="1.05" opacity=".72">
      <animate attributeName="r" values="14;20;14" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".28;.72;.28" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g stroke="#38bdf8" stroke-width="1.08" stroke-linecap="round" fill="none" opacity=".96">
    <path d="M48 45 31 26 20 38 27 57 48 45 67 25 78 39 69 58 48 45"/>
    <path d="M48 45 42 17 55 18 48 45 18 51 27 68 48 45 77 52 67 68 48 45"/>
    <path d="M31 26 42 17 55 18 67 25 78 39 77 52 67 68 48 73 27 68 18 51 20 38 31 26"/>
    <animate attributeName="opacity" values=".54;.98;.54" dur="2.8s" repeatCount="indefinite"/>
  </g>

  <g fill="url(#nodeGlow)" stroke="#f0fdff" stroke-width=".55">
    <circle cx="31" cy="26" r="2.3"/>
    <circle cx="20" cy="38" r="2"/>
    <circle cx="27" cy="57" r="2.1"/>
    <circle cx="67" cy="25" r="2.2"/>
    <circle cx="78" cy="39" r="2"/>
    <circle cx="69" cy="58" r="2.1"/>
    <circle cx="42" cy="17" r="1.8"/>
    <circle cx="55" cy="18" r="1.8"/>
    <circle cx="18" cy="51" r="1.8"/>
    <circle cx="27" cy="68" r="1.8"/>
    <circle cx="77" cy="52" r="1.8"/>
    <circle cx="67" cy="68" r="1.8"/>
    <circle cx="48" cy="73" r="1.8"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="2.1s" additive="sum" repeatCount="indefinite"/>
  </g>

  <g stroke="#7dd3fc" stroke-width=".9" stroke-linecap="round" opacity=".72">
    <path d="M48 45 48 15"/>
    <path d="M48 45 83 31"/>
    <path d="M48 45 82 62"/>
    <path d="M48 45 48 76"/>
    <path d="M48 45 14 62"/>
    <path d="M48 45 13 32"/>
    <animateTransform attributeName="transform" type="rotate" from="0 48 45" to="360 48 45" dur="9s" repeatCount="indefinite"/>
  </g>
</svg>
