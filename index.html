<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f5dcc0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AI의정브레인">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>충청남도의회AI의정브레인 챗봇</title>
  <link rel="icon" type="image/png" href="app_icon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <section class="login-screen login-theme-basic" id="login-screen">
    <form class="login-card" id="login-form">
      <img src="icon.png" class="login-mark" alt="">
      <span class="login-at-mark" aria-hidden="true">@</span>
      <h2>충청남도의회 AI의정브레인</h2>
      <p>PERSONAL LOGIN</p>
      <label class="login-field" for="login-username">
        <span>이용자 ID</span>
        <input id="login-username" type="text" placeholder="아이디" autocomplete="username" required>
      </label>
      <label class="login-field" for="login-password">
        <span>비밀번호</span>
        <input id="login-password" type="password" placeholder="비밀번호" autocomplete="current-password" required>
      </label>
      <div class="login-options">
        <label>
          <input id="remember-login" type="checkbox">
          <span>자동로그인</span>
        </label>
        <label>
          <input id="remember-id" type="checkbox">
          <span>아이디 기억</span>
        </label>
      </div>
      <button type="submit">로그인</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </section>

  <div class="app">
    <div class="window-controls" aria-hidden="true">
      <span class="window-control close"></span>
    </div>
    <aside class="sidebar" aria-label="이전 대화 목록">
      <div class="window-controls sidebar-controls">
        <button class="window-control close" id="history-close" type="button" aria-label="채팅 기록 닫기"></button>
      </div>
      <div class="conversation-panel">
        <div class="conversation-title">채팅 기록</div>
        <div class="conversation-list" id="conversation-list"></div>
        <div class="sidebar-account">
          <div class="user-chip" id="user-chip"></div>
          <button class="admin-btn hidden" id="admin-open" type="button">관리자</button>
          <button class="logout-btn" id="logout-btn" type="button">로그아웃</button>
        </div>
      </div>
    </aside>

    <main class="main-panel">
      <header class="chat-header">
        <nav class="chat-menu-bar" aria-label="상단 메뉴">
          <button type="button" id="menu-feature">새 대화(A)</button>
          <button type="button" id="menu-tools">글자 설정(T)</button>
          <button type="button" id="menu-history">채팅 기록(C)</button>
          <button type="button" id="menu-theme">테마(S)</button>
        </nav>
        <div class="text-style-panel hidden" id="text-style-panel" aria-label="글자 설정">
          <label>
            <span>글자 크기</span>
            <select id="input-font-size">
              <option value="10px">10</option>
              <option value="12px">12</option>
              <option value="14px" selected>14</option>
              <option value="16px">16</option>
              <option value="18px">18</option>
              <option value="20px">20</option>
            </select>
          </label>
          <label>
            <span>폰트</span>
            <select id="input-font-family">
              <option value="'RoundedFixedsys', system-ui, sans-serif">둥근고정</option>
              <option value="'JoseonGulim', system-ui, sans-serif">조선굴림</option>
              <option value="'Nanum Myeongjo', serif">나눔명조</option>
              <option value="'OngleipKonkon', system-ui, sans-serif">온글잎 콘콘</option>
              <option value="'NexonLv1Gothic', system-ui, sans-serif">넥슨 Lv1 고딕</option>
              <option value="system-ui, sans-serif">기본체</option>
            </select>
          </label>
        </div>
        <div class="theme-panel hidden" id="theme-panel" aria-label="테마 설정">
          <button type="button" data-theme="retro">레트로</button>
          <button type="button" data-theme="basic">기본테마</button>
          <button type="button" data-theme="document">의회테마</button>
        </div>
        <div class="header-left">
          <div class="header-brand">
            <img src="favicon.png" class="header-mark" alt="">
            <div>
              <p class="header-sub">충청남도의회</p>
              <h1><span class="brand-accent">AI</span>의정브레인<span class="brand-italic">Talk</span></h1>
            </div>
          </div>
        </div>

        <div class="header-actions">
          <button class="admin-menu-btn hidden" id="admin-menu-btn" type="button" aria-label="관리자 메뉴">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </header>


      <section class="chat-stage" aria-label="의정브레인 채팅">
        <div class="work-area" id="work-area">
          <div class="scroll-area" id="scroll-area">
            <div id="messages">
              <div class="welcome-block" id="welcome">
                <div class="welcome-row">
                  <div class="welcome-bubble">
                    안녕하세요!<br>충청남도의회AI의정브레인입니다.<br>
                    재정용어 및 예산, 사업설명서와 관련하여<br>궁금한 내용을 질문해 주세요.
                  </div>
                </div>
                <div class="welcome-help">질문 분야를 선택하시고 질문해 주세요.</div>
                <div class="service-menu" aria-label="분석 분야 선택">
                  <button class="quick-card" type="button" data-model="ai_chatbot">
                    <span class="quick-icon"><img src="icon-finance.svg" alt=""></span>
                    <span>
                      <strong>재정용어<br>관련 법령</strong>
                      <small class="quick-sub">&nbsp;</small>
                    </span>
                  </button>
                  <button class="quick-card" type="button" data-model="ai_chatbot_cn">
                    <span class="quick-icon"><img src="icon-office.svg" alt=""></span>
                    <span>
                      <strong>충남도청</strong>
                      <small class="quick-sub">예산·사업설명서</small>
                    </span>
                  </button>
                  <button class="quick-card" type="button" data-model="ai_chatbot_cnedu">
                    <span class="quick-icon"><img src="icon-education.svg" alt=""></span>
                    <span>
                      <strong>충청남도교육청</strong>
                      <small class="quick-sub">예산·사업설명서</small>
                    </span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="model-bar" id="model-bar" aria-label="모델 선택"></div>
        <form class="composer" id="composer">
          <div class="composer-input-row">
            <textarea id="user-input" rows="1" placeholder="잠시만 기다려주세요." disabled></textarea>
            <button id="send-btn" type="submit" aria-label="전송">보내기</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <section class="admin-modal hidden" id="admin-modal" aria-label="사용자 관리">
    <div class="admin-panel">
      <div class="admin-head">
        <h2>사용자 관리</h2>
        <div class="admin-head-actions">
          <button id="admin-create-toggle" type="button" aria-expanded="false">계정 추가</button>
          <button id="admin-close" type="button">닫기</button>
        </div>
      </div>
      <form class="admin-create hidden" id="user-create-form">
        <input id="new-username" type="text" placeholder="아이디" required>
        <input id="new-display-name" type="text" placeholder="표시 이름" required>
        <input id="new-password" type="password" placeholder="초기 비밀번호" required>
        <select id="new-role">
          <option value="user">일반 사용자</option>
          <option value="admin">관리자</option>
        </select>
        <button type="submit">계정 추가</button>
      </form>
      <div class="admin-toolbar">
        <input id="admin-user-search" type="search" placeholder="사용자 검색" autocomplete="off">
        <span id="admin-user-count">사용자 0명</span>
      </div>
      <div class="admin-users" id="admin-users"></div>
    </div>
  </section>

  <script src="script.js"></script>
</body>

</html>
