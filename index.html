<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5dcc0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AI의정브레인">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>충청남도의회AI의정브레인 챗봇</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <section class="login-screen" id="login-screen">
    <form class="login-card" id="login-form">
      <img src="favicon.png" class="login-mark" alt="">
      <span class="login-at-mark" aria-hidden="true">@</span>
      <h2>충청남도의회 AI의정브레인</h2>
      <p>PERSONAL LOGIN</p>
      <label class="login-field" for="login-username">
        <span>이용자 ID</span>
        <input id="login-username" type="text" placeholder="아이디" autocomplete="username" required>
      </label>
      <label class="login-field" for="login-password">
        <span>비밀번호</span>
        <input id="login-password" type="password" placeholder="비밀번호" autocomplete="current-password" required>
      </label>
      <button type="submit">로그인</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </section>

  <div class="app">
    <aside class="sidebar" aria-label="이전 대화 목록">
      <div class="conversation-panel">
        <div class="conversation-title">채팅 기록</div>
        <div class="conversation-list" id="conversation-list"></div>
        <div class="sidebar-account">
          <div class="user-chip" id="user-chip"></div>
          <button class="admin-btn hidden" id="admin-open" type="button">관리자</button>
          <button class="logout-btn" id="logout-btn" type="button">로그아웃</button>
        </div>
      </div>
    </aside>

    <main class="main-panel">
      <header class="chat-header">
        <div class="header-left">
          <div class="header-brand">
            <img src="favicon.png" class="header-mark" alt="">
            <div>
              <p class="header-sub">충청남도의회</p>
              <h1><span class="brand-accent">AI</span>의정브레인<span class="brand-italic">Talk</span></h1>
            </div>
          </div>
        </div>

        <div class="header-actions">
          <button class="admin-menu-btn hidden" id="admin-menu-btn" type="button" aria-label="관리자 메뉴">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <button class="new-chat-btn" type="button" onclick="clearChat()" aria-label="새 채팅">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            <span>새 대화</span>
          </button>
        </div>
      </header>


      <section class="chat-stage" aria-label="의정브레인 채팅">
        <div class="work-area" id="work-area">
          <div class="scroll-area" id="scroll-area">
            <div id="messages">
              <div class="welcome-block" id="welcome">
                <div class="welcome-row">
                  <div class="welcome-bubble">
                    안녕하세요!<br>충청남도의회AI의정브레인입니다.<br>
                    재정용어 및 예산, 사업설명서와 관련하여<br>궁금한 내용을 질문해 주세요.
                  </div>
                </div>
                <div class="welcome-help">질문 분야를 선택하시고 질문해 주세요.</div>
                <div class="service-menu" aria-label="분석 분야 선택">
                  <button class="quick-card" type="button" data-model="ai_chatbot">
                    <span class="quick-icon"><img src="icon-finance.svg" alt=""></span>
                    <span>
                      <strong>재정용어·관련 법령</strong>
                      <small class="quick-sub">&nbsp;</small>
                    </span>
                  </button>
                  <button class="quick-card" type="button" data-model="ai_chatbot_cn">
                    <span class="quick-icon"><img src="icon-office.svg" alt=""></span>
                    <span>
                      <strong>충남도청</strong>
                      <small class="quick-sub">예산·사업설명서</small>
                    </span>
                  </button>
                  <button class="quick-card" type="button" data-model="ai_chatbot_cnedu">
                    <span class="quick-icon"><img src="icon-education.svg" alt=""></span>
                    <span>
                      <strong>충청남도교육청</strong>
                      <small class="quick-sub">예산·사업설명서</small>
                    </span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="buddy-panel" aria-label="대화 상대 정보">
          <div class="buddy-card buddy-primary">
            <img src="충랑이.png" alt="">
            <strong>충랑이</strong>
          </div>
          <div class="buddy-card">
            <img src="favicon.png" alt="">
            <strong>충청남도의회</strong>
          </div>
          <div class="buddy-card buddy-bottom">
            <img src="백룡이.png" alt="">
            <strong>백룡이</strong>
          </div>
        </aside>

        <div class="model-bar" id="model-bar" aria-label="모델 선택"></div>
        <form class="composer" id="composer">
          <div class="composer-tools" aria-label="입력 도구">
            <button class="composer-tool" id="text-style-toggle" type="button" aria-label="글자 설정" aria-expanded="false">T</button>
            <button class="composer-tool" type="button" aria-label="이모티콘">🙂</button>
            <button class="composer-tool" type="button" aria-label="붙여넣기">📋</button>
          </div>
          <div class="text-style-panel hidden" id="text-style-panel" aria-label="글자 설정">
            <label>
              <span>크기</span>
              <select id="input-font-size">
                <option value="8px">8</option>
                <option value="10px">10</option>
                <option value="14px">14</option>
                <option value="16px" selected>16</option>
                <option value="18px">18</option>
                <option value="20px">20</option>
              </select>
            </label>
            <label>
              <span>폰트</span>
              <select id="input-font-family">
                <option value="'RoundedFixedsys', system-ui, sans-serif">둥근고정</option>
                <option value="'Yangjin', 'RoundedFixedsys', system-ui, sans-serif">양진체</option>
                <option value="system-ui, sans-serif">기본체</option>
              </select>
            </label>
          </div>
          <textarea id="user-input" rows="1" placeholder="잠시만 기다려주세요. 연결중입니다." disabled></textarea>
          <button id="send-btn" type="submit" aria-label="전송">보내기</button>
        </form>
      </section>
    </main>
  </div>

  <section class="admin-modal hidden" id="admin-modal" aria-label="사용자 관리">
    <div class="admin-panel">
      <div class="admin-head">
        <h2>사용자 관리</h2>
        <button id="admin-close" type="button">닫기</button>
      </div>
      <form class="admin-create" id="user-create-form">
        <input id="new-username" type="text" placeholder="아이디" required>
        <input id="new-display-name" type="text" placeholder="표시 이름" required>
        <input id="new-password" type="password" placeholder="초기 비밀번호" required>
        <select id="new-role">
          <option value="user">일반 사용자</option>
          <option value="admin">관리자</option>
        </select>
        <button type="submit">계정 추가</button>
      </form>
      <div class="admin-users" id="admin-users"></div>
    </div>
  </section>

  <script src="script.js"></script>
</body>

</html>
